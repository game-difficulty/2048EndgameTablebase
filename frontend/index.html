<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 Endgame Tablebase</title>
    <script>
      (() => {
        const currentUrl = new URL(window.location.href);
        const startupTheme = currentUrl.searchParams.get('startup_theme');
        const backendPort = currentUrl.searchParams.get('backend_port');
        if (backendPort) {
          currentUrl.port = backendPort;
        }
        window.__APP_BACKEND_ORIGIN__ = currentUrl.origin;
        if (startupTheme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (startupTheme === 'light') {
          document.documentElement.removeAttribute('data-theme');
        }
      })();
    </script>
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true, processEnvironments: true },
        svg: { fontCache: 'global' },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
      };
    </script>
    <script>
      (() => {
        const script = document.createElement('script');
        script.id = 'MathJax-script';
        script.async = true;
        script.src = `${window.__APP_BACKEND_ORIGIN__ || window.location.origin}/mathjax/tex-svg.js`;
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
